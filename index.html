<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>減肥軍師系統 - Diet Advisor</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('diet');
            const [editingId, setEditingId] = useState(null);
            
            // --- 狀態管理 (LocalStorage) ---
            
            // 1. 每日即時紀錄
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('diet_logs');
                return saved ? JSON.parse(saved) : [];
            });

            // 2. 當前身體狀態
            const [stats, setStats] = useState(() => {
                const saved = localStorage.getItem('diet_stats');
                return saved ? JSON.parse(saved) : {
                    weight: 75.0,
                    bodyFat: 28.5,
                    targetWeight: 60.0,
                    targetFat: 20.0,
                    water: 0, 
                };
            });

            // 3. 歷史存檔 (新增項目)
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('diet_history');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => { localStorage.setItem('diet_logs', JSON.stringify(logs)); }, [logs]);
            useEffect(() => { localStorage.setItem('diet_stats', JSON.stringify(stats)); }, [stats]);
            useEffect(() => { localStorage.setItem('diet_history', JSON.stringify(history)); }, [history]);

            const [advisorMessage, setAdvisorMessage] = useState({});
            
            // 表單狀態
            const [foodName, setFoodName] = useState('');
            const [exName, setExName] = useState('羽毛球');
            const [exDuration, setExDuration] = useState(60);
            const [newWeight, setNewWeight] = useState(stats.weight);
            const [newFat, setNewFat] = useState(stats.bodyFat);
            const [editValue, setEditValue] = useState({});

            useEffect(() => { analyzeSituation(); }, [logs, stats.weight, stats.bodyFat]);

            // --- 核心邏輯 ---

            const getFoodAnalysis = (name) => {
                const n = name.toLowerCase();
                let cat = 'carb'; // 預設安全判定為澱粉
                let rating = '';
                let feedback = '';
                let impact = 'medium';

                // 自動智能分析成分 (特徵辨識強化版)
                const hasProtein = ['蛋', '雞', '牛', '豬', '魚', '蝦', '豆腐', '豆漿', '肉', '奶', '三文魚', '排', '扒', '海鮮'].some(k => n.includes(k));
                const hasCarb = ['飯', '麵', '粉', '包', '餅', '薯', '粟米', '河粉', '烏冬', '皮', '粥', '麥片', '多士'].some(k => n.includes(k));
                const hasVeg = ['菜', '菇', '瓜', '菠菜', '番茄', '洋蔥', '沙律', '豆', '果', '蘋果', '蕉', '橙', '西蘭花'].some(k => n.includes(k));
                const hasFatCheat = ['炸', '腩', '芝士', '糖', '甜', '腸', '響鈴', '醬', '糕', '雪糕', '酒', '朱古力', '汽水', '可樂', '奶茶', '薯片', '牛角包'].some(k => n.includes(k));
                const hasGoodFat = ['牛油果', '核桃', '堅果', '三文魚', '杏仁', '腰果'].some(k => n.includes(k));

                // 全自動智能邏輯判斷
                if (hasFatCheat) {
                    cat = 'cheat'; rating = '熱量陷阱'; impact = 'high';
                    feedback = '系統偵測到高脂/高糖成分！呢啲會迅速轉化為頑固脂肪，下一餐必須大幅扣減配額。';
                } else if (hasCarb && !hasProtein && !hasVeg) {
                    cat = 'carb'; rating = '純碳水炸彈'; impact = 'high';
                    feedback = '缺乏蛋白質同纖維緩衝，會令血糖急升急跌！建議加返隻蛋或者少少菜減緩吸收。';
                } else if (hasCarb && (hasProtein || hasVeg)) {
                    cat = 'carb'; rating = '複合能量'; impact = 'medium';
                    feedback = '有蛋白質/纖維幫手，呢份澱粉吸收得會比較平穩，適合做運動前嘅燃料。';
                } else if (hasProtein && hasVeg) {
                    cat = 'protein'; rating = '完美修復餐'; impact = 'low';
                    feedback = '高蛋白加高纖維！飽腹感強兼且幫助肌肉修復，軍師極度推薦呢種黃金配搭！';
                } else if (hasGoodFat) {
                    cat = 'protein'; rating = '優質油脂'; impact = 'medium';
                    feedback = '優質脂肪有助抗發炎同提供持久飽足感，但始終熱量唔低，請注意總份量。';
                } else if (hasProtein) {
                    cat = 'protein'; rating = '純粹肌肉燃料'; impact = 'low';
                    feedback = '直接修補肌肉嘅優質建材。如果加多啲深綠色蔬菜一齊食，排毒效果會更好。';
                } else if (hasVeg) {
                    cat = 'veg'; rating = '去水排毒神器'; impact = 'low';
                    feedback = '豐富纖維同鉀質，幫你排走多餘水分同鈉，係火鍋或者大餐後嘅急救救星。';
                } else {
                    cat = 'carb'; rating = '未知軍糧'; impact = 'medium'; 
                    feedback = '軍師無法準確識別此食物，為安全起見預設歸類為澱粉，請留意攝取份量。';
                }

                return { category: cat, rating, feedback, impact };
            };

            const analyzeSituation = () => {
                const carbCount = logs.filter(l => l.type === 'diet' && (l.category === 'carb' || l.category === 'cheat')).length;
                const totalBurn = logs.filter(l => l.type === 'exercise').reduce((acc, curr) => acc + curr.calories, 0);
                
                const now = new Date();
                const currentHour = now.getHours();
                
                // 尋找最後一次進食與運動時間
                const lastDietLog = logs.slice().reverse().find(l => l.type === 'diet');
                const lastExerciseLog = logs.slice().reverse().find(l => l.type === 'exercise');
                
                let timeAdvice = "系統正收集數據...";
                let nextMealTime = "視乎狀況";
                let tacticalAction = "等待指令";
                let status = "normal";
                let title = "🛡️ 戰術推演中";

                // 1. 根據「真實時間」與「消化週期」判定
                if (currentHour >= 21 || currentHour <= 4) {
                    title = "🌙 夜間代謝減慢";
                    timeAdvice = "依家夜深，身體準備休息，消化能力下降。";
                    nextMealTime = "明早起床後";
                    tacticalAction = "全面禁食！真係餓到瞓唔著最多飲半杯無糖豆漿或蛋白。";
                    status = "warning";
                } else if (lastExerciseLog && (currentHour - parseInt(lastExerciseLog.time.split(':')[0])) <= 2 && (currentHour - parseInt(lastExerciseLog.time.split(':')[0])) >= 0) {
                    title = "🏸 戰後黃金吸收期";
                    timeAdvice = "剛完成高強度運動，肌肉細胞急需養分修復。";
                    nextMealTime = "現在立即";
                    tacticalAction = "極速補充蛋白質 (如雞胸、蛋) 及微量碳水，切忌捱餓！";
                    status = "success";
                } else if (lastDietLog) {
                    const lastLogHour = parseInt(lastDietLog.time.split(':')[0]);
                    const hoursSinceLastMeal = currentHour - lastLogHour;
                    
                    if (hoursSinceLastMeal < 3 && hoursSinceLastMeal >= 0) {
                        title = "⏳ 消化推進中";
                        timeAdvice = `距離上一餐只係過咗大約 ${hoursSinceLastMeal} 個鐘，食物仲消化緊。`;
                        nextMealTime = `大約 ${lastLogHour + 4}:00 後`;
                        tacticalAction = "如果口痕，請飲清水或黑咖啡，絕對避免攝取額外熱量。";
                    } else if (hoursSinceLastMeal >= 4) {
                        title = "🍽️ 能量谷底";
                        timeAdvice = `距離上一餐已經超過 4 小時，血糖開始下降，係補充能量嘅好時機。`;
                        nextMealTime = "現在適合進食";
                        tacticalAction = "可以開始進食正餐，請依照軍師的成分配額分配。";
                    } else {
                        title = "🛡️ 穩定減脂期";
                        timeAdvice = "目前處於平穩狀態，請維持規律作息。";
                        nextMealTime = "感到7分餓時";
                        tacticalAction = "保持水分充足，準備下一場戰役。";
                    }
                } else {
                    title = "🌅 晨間啟動";
                    timeAdvice = "今日仲未有進食紀錄，身體需要燃料啟動代謝。";
                    nextMealTime = "隨時可以進食";
                    tacticalAction = "建議以高蛋白+好脂肪嘅早餐開始 (如：雞蛋+牛油果)。";
                }

                // 2. 疊加「成分配額」判定 (高優先級覆蓋)
                if (carbCount >= 3 && currentHour < 21) {
                    title = "⚠️ 澱粉配額紅區警戒！";
                    timeAdvice += ` 你今日已經食咗 ${carbCount} 次高碳水/邪惡食物。`;
                    tacticalAction = "下一餐必須執行「絕對零澱粉禁令」，只准食綠色蔬菜同白肉！";
                    status = "warning";
                } else if (totalBurn >= 800 && currentHour < 21 && status !== "success") {
                    title = "🔥 戰神級能量消耗！";
                    timeAdvice += ` 今日消耗巨大 (-${totalBurn}kcal)。`;
                    tacticalAction = "下一餐可略微增加優質蛋白質份量，獎勵辛勞嘅肌肉。";
                    status = "success";
                }

                setAdvisorMessage({
                    title: title,
                    content: timeAdvice,
                    nextMeal: nextMealTime,
                    action: tacticalAction,
                    status: status
                });
            };

            const calculateCalories = (name, duration) => {
                const metValues = { '羽毛球': 7.2, '急步行': 4.5, '跑步': 9.8, '健身': 6.0 };
                const met = metValues[name] || 5.0;
                return Math.round(met * stats.weight * (duration / 60) * 1.2);
            };

            // --- 事件處理 ---
            const handleAddFood = (e) => {
                e.preventDefault();
                if (!foodName) return;
                const analysis = getFoodAnalysis(foodName);
                setLogs([...logs, {
                    id: Date.now(),
                    type: 'diet',
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    name: foodName,
                    ...analysis
                }]);
                setFoodName('');
            };

            const handleAddExercise = (e) => {
                e.preventDefault();
                if (!exDuration) return;
                setLogs([...logs, {
                    id: Date.now(),
                    type: 'exercise',
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    name: exName,
                    duration: parseInt(exDuration),
                    calories: calculateCalories(exName, exDuration)
                }]);
                setExDuration(60);
            };

            const handleUpdateStats = (e) => {
                e.preventDefault();
                setStats({ ...stats, weight: parseFloat(newWeight) || stats.weight, bodyFat: parseFloat(newFat) || stats.bodyFat });
                setActiveTab('diet');
            };

            // --- 重置與封存邏輯 ---
            const archiveAndReset = () => {
                if(window.confirm("軍師確認：封存今日數據並重置紀錄？")) {
                    const totalBurn = logs.filter(l => l.type === 'exercise').reduce((acc, curr) => acc + curr.calories, 0);
                    const mealCount = logs.filter(l => l.type === 'diet').length;
                    
                    const archiveEntry = {
                        date: new Date().toLocaleDateString(),
                        weight: stats.weight,
                        bodyFat: stats.bodyFat,
                        totalBurn,
                        mealCount,
                        water: stats.water
                    };

                    setHistory([archiveEntry, ...history]);
                    setLogs([]);
                    setStats({...stats, water: 0});
                }
            };

            const deleteArchive = (index) => {
                if(window.confirm("確定要刪除這條歷史紀錄？")) {
                    setHistory(history.filter((_, i) => i !== index));
                }
            };

            const startEdit = (log) => { setEditingId(log.id); setEditValue({ ...log }); };

            const saveEdit = () => {
                const updatedLogs = logs.map(log => {
                    if (log.id === editingId) {
                        if (log.type === 'diet') {
                            const analysis = getFoodAnalysis(editValue.name);
                            return { ...editValue, ...analysis };
                        } else {
                            return { ...editValue, calories: calculateCalories(editValue.name, editValue.duration) };
                        }
                    }
                    return log;
                });
                setLogs(updatedLogs);
                setEditingId(null);
            };

            const deleteLog = (id) => {
                if(window.confirm("軍師確認：是否刪除此筆戰報？")) {
                    setLogs(logs.filter(log => log.id !== id));
                }
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <div className="bg-[#0F172A] text-white pt-10 pb-14 px-6 rounded-b-[2.5rem] shadow-2xl relative">
                        <div className="flex justify-between items-center mb-8 relative z-10">
                            <h1 className="text-xl font-black italic flex items-center uppercase tracking-tight">
                                <div className="bg-emerald-500 p-1.5 rounded-lg mr-2 text-slate-900 text-lg leading-none">🛡️</div>
                                Diet Commander
                            </h1>
                            <div className="bg-white/5 border border-white/10 px-3 py-1 rounded-full text-[11px] font-bold">
                                DATA PERSISTED
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 relative z-10">
                            <div className="bg-white/5 backdrop-blur-xl p-5 rounded-[2rem] border border-white/10">
                                <span className="text-[10px] uppercase font-black text-slate-400 flex items-center mb-2 tracking-wider">⚖️ Weight</span>
                                <div className="flex items-baseline">
                                    <span className="text-4xl font-black tabular-nums">{stats.weight}</span>
                                    <span className="text-xs ml-1 font-bold text-slate-400">KG</span>
                                </div>
                            </div>
                            <div className="bg-white/5 backdrop-blur-xl p-5 rounded-[2rem] border border-white/10">
                                <span className="text-[10px] uppercase font-black text-slate-400 flex items-center mb-2 tracking-wider">📉 Body Fat</span>
                                <div className="flex items-baseline">
                                    <span className="text-4xl font-black tabular-nums">{stats.bodyFat}</span>
                                    <span className="text-xs ml-1 font-bold text-slate-400">%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-5 -mt-10 relative z-20">
                        {/* 軍師卡片 */}
                        <div className={`p-6 rounded-[2.5rem] shadow-xl mb-8 border-2 transition-all ${advisorMessage.status === 'warning' ? 'bg-amber-500 border-amber-400 text-white shadow-amber-200' : advisorMessage.status === 'success' ? 'bg-emerald-600 border-emerald-500 text-white shadow-emerald-200' : 'bg-slate-800 border-slate-700 text-white shadow-slate-300'}`}>
                            <div className="flex items-center mb-4"><div className="bg-white/20 p-2 rounded-xl mr-3 text-lg leading-none">💡</div><h2 className="text-lg font-black italic">{advisorMessage.title}</h2></div>
                            <p className="text-sm font-medium leading-relaxed mb-6 opacity-95">「{advisorMessage.content}」</p>
                            <div className="space-y-3">
                                <div className="bg-black/20 p-4 rounded-2xl flex items-center">
                                    <span className="mr-3 opacity-80 text-lg">⏰</span>
                                    <div><p className="text-[10px] font-black uppercase opacity-60">Next Meal</p><p className="text-sm font-black">{advisorMessage.nextMeal}</p></div>
                                </div>
                                <div className="bg-black/20 p-4 rounded-2xl flex items-start">
                                    <span className="mr-3 mt-0.5 opacity-80 text-lg">🎯</span>
                                    <div><p className="text-[10px] font-black uppercase opacity-60">Tactical Action</p><p className="text-sm font-bold">{advisorMessage.action}</p></div>
                                </div>
                            </div>
                        </div>

                        {/* 分頁控制 */}
                        <div className="bg-slate-200/60 backdrop-blur p-1.5 rounded-2xl flex mb-8 overflow-x-auto no-scrollbar">
                            {['diet', 'exercise', 'stats', 'history'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 min-w-[70px] py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all ${activeTab === tab ? 'bg-white shadow-md text-slate-900' : 'text-slate-500 hover:text-slate-700'}`}>
                                    {tab === 'diet' ? 'Meal' : tab === 'exercise' ? 'Activity' : tab === 'stats' ? 'Vitals' : 'History'}
                                </button>
                            ))}
                        </div>

                        {/* 分頁內容 */}
                        <div className="bg-white p-7 rounded-[3rem] shadow-lg shadow-slate-100 mb-10 border border-slate-50">
                            {activeTab === 'diet' && (
                                <form onSubmit={handleAddFood} className="space-y-5">
                                    <h3 className="font-black text-xl italic uppercase text-slate-800">New Supply</h3>
                                    <input type="text" placeholder="食咗啲乜？ (例如: 雞胸肉/蘋果)" className="w-full px-6 py-4 bg-slate-100 rounded-2xl text-sm font-bold outline-none" value={foodName} onChange={(e) => setFoodName(e.target.value)} />
                                    <div className="bg-blue-50 p-4 rounded-2xl text-xs font-bold text-blue-600 flex items-center">
                                        <span className="text-lg mr-2">🤖</span> 軍師將根據食物名稱自動為您分析成分及評價。
                                    </div>
                                    <button className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Confirm Supply</button>
                                </form>
                            )}

                            {activeTab === 'exercise' && (
                                <form onSubmit={handleAddExercise} className="space-y-5">
                                    <h3 className="font-black text-xl italic uppercase text-slate-800">Combat Output</h3>
                                    <select className="w-full px-6 py-4 bg-slate-100 rounded-2xl text-sm font-bold outline-none" value={exName} onChange={(e) => setExName(e.target.value)}>
                                        <option value="羽毛球">🏸 羽毛球</option><option value="急步行">🚶‍♂️ 急步行</option><option value="跑步">🏃‍♂️ 跑步</option><option value="健身">🏋️‍♂️ 健身</option>
                                    </select>
                                    <div className="flex items-center bg-slate-100 rounded-2xl px-6"><span className="text-slate-400 mr-4 text-lg">⏰</span><input type="number" className="bg-transparent py-4 w-full outline-none text-sm font-bold" value={exDuration} onChange={(e) => setExDuration(e.target.value)} /><span className="text-slate-400 font-black text-[10px]">MINS</span></div>
                                    <button className="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Log Combat</button>
                                </form>
                            )}

                            {activeTab === 'stats' && (
                                <form onSubmit={handleUpdateStats} className="space-y-6">
                                    <h3 className="font-black text-xl italic uppercase text-slate-800">Update Vitals</h3>
                                    <div className="space-y-4">
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Weight (KG)</label><input type="number" step="0.1" className="w-full px-6 py-4 bg-slate-100 rounded-2xl text-2xl font-black outline-none" value={newWeight} onChange={(e) => setNewWeight(e.target.value)} /></div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 ml-2">Body Fat (%)</label><input type="number" step="0.1" className="w-full px-6 py-4 bg-slate-100 rounded-2xl text-2xl font-black outline-none" value={newFat} onChange={(e) => setNewFat(e.target.value)} /></div>
                                    </div>
                                    <button className="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Sync Vitals</button>
                                </form>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4">
                                    <h3 className="font-black text-xl italic uppercase text-slate-800">History Archives</h3>
                                    {history.length === 0 ? <p className="text-center text-slate-400 py-4 text-sm font-bold">目前尚無歷史存檔</p> : history.map((h, i) => (
                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl border border-slate-100 relative">
                                            <button onClick={() => deleteArchive(i)} className="absolute top-3 right-3 text-slate-300 hover:text-rose-500">🗑️</button>
                                            <p className="text-[10px] font-black text-slate-400 mb-2">{h.date}</p>
                                            <div className="grid grid-cols-2 gap-y-2">
                                                <div className="text-xs font-black">⚖️ {h.weight}kg</div>
                                                <div className="text-xs font-black">📉 {h.bodyFat}%</div>
                                                <div className="text-xs font-black text-emerald-600">🔥 -{h.totalBurn}kcal</div>
                                                <div className="text-xs font-black text-blue-600">💧 {h.water}L</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* 即時列表 (History 分頁時不顯示) */}
                        {activeTab !== 'history' && (
                            <div className="space-y-5 pb-10">
                                <div className="flex justify-between items-center px-2">
                                    <h3 className="font-black text-slate-900 uppercase italic tracking-tighter text-lg border-l-4 border-slate-900 pl-3">Daily Briefing</h3>
                                    {logs.length > 0 && (
                                        <button onClick={archiveAndReset} className="text-[10px] font-bold text-rose-500 bg-rose-50 px-3 py-1.5 rounded-xl uppercase">Archive & Reset</button>
                                    )}
                                </div>
                                <div className="space-y-4">
                                    {logs.slice().reverse().map((log) => (
                                        <div key={log.id} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 relative group">
                                            {editingId === log.id ? (
                                                <div className="space-y-4">
                                                    <div className="flex items-center space-x-2">
                                                        <input className="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none" value={editValue.name} onChange={(e) => setEditValue({ ...editValue, name: e.target.value })} />
                                                        <input type="text" className="w-24 px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-center" value={editValue.time} onChange={(e) => setEditValue({ ...editValue, time: e.target.value })} />
                                                    </div>
                                                    
                                                    {log.type === 'exercise' && (
                                                        <div className="flex flex-col space-y-1">
                                                            <label className="text-[9px] font-black text-slate-400 ml-1">DURATION (MINS)</label>
                                                            <input type="number" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none" value={editValue.duration} onChange={(e) => setEditValue({ ...editValue, duration: parseInt(e.target.value) || 0 })} />
                                                        </div>
                                                    )}
                                                    
                                                    <div className="flex space-x-3 pt-2">
                                                        <button onClick={saveEdit} className="flex-1 bg-emerald-500 text-white py-3 rounded-xl text-xs font-black flex justify-center items-center shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                                                            ✅ SAVE
                                                        </button>
                                                        <button onClick={() => setEditingId(null)} className="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl text-xs font-black flex justify-center items-center active:scale-95 transition-all">
                                                            ❌ CANCEL
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="absolute top-4 right-5 flex space-x-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => startEdit(log)} className="text-slate-400 hover:text-blue-500">✏️</button>
                                                        <button onClick={() => deleteLog(log.id)} className="text-slate-400 hover:text-rose-500">🗑️</button>
                                                    </div>
                                                    <div className="flex items-center mb-4 pr-16">
                                                        <div className={`w-12 h-12 rounded-[1.25rem] flex items-center justify-center mr-4 text-2xl ${log.type === 'exercise' ? 'bg-emerald-50' : 'bg-slate-50'}`}>{log.type === 'exercise' ? '🔥' : '🍽️'}</div>
                                                        <div><p className="font-black text-slate-900 text-[15px]">{log.name}</p><p className="text-[10px] font-black text-slate-400 uppercase mt-0.5">{log.time}</p></div>
                                                    </div>
                                                    {log.type === 'diet' ? (
                                                        <div className="space-y-3">
                                                            <div className={`inline-block px-3 py-1.5 rounded-xl text-[9px] font-black uppercase border-2 ${log.impact === 'high' ? 'bg-rose-50 border-rose-100 text-rose-500' : log.impact === 'medium' ? 'bg-amber-50 border-amber-100 text-amber-500' : 'bg-emerald-50 border-emerald-100 text-emerald-500'}`}>{log.rating}</div>
                                                            <div className="bg-slate-50 p-4 rounded-2xl text-[11px] font-bold text-slate-600 border-l-4 border-slate-200">軍師：「{log.feedback}」</div>
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center justify-between mt-2"><span className="font-black text-sm italic text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl">-{log.calories} KCAL</span><span className="text-[10px] font-black text-slate-400 bg-slate-50 px-3 py-1.5 rounded-xl">{log.duration} MINS</span></div>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    <button onClick={() => setStats({...stats, water: +(stats.water + 0.25).toFixed(2)})} className="fixed bottom-6 right-6 w-16 h-16 bg-blue-500 text-white rounded-[2rem] shadow-xl flex flex-col items-center justify-center border-4 border-white z-50">
                        <span className="text-xl">💧</span><span className="text-[9px] font-black">{stats.water}L</span>
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
